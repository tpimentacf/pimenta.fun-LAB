# www.pimenta.fun — static site over HTTPS (HTTP redirects to HTTPS)
# Enable modules:  sudo a2enmod ssl headers rewrite

# ---- HTTP : redirect to HTTPS (allow ACME challenges through) ----
<VirtualHost *:80>
    ServerName www.pimenta.fun
    ServerAlias pimenta.fun

    DocumentRoot /var/www/pimenta/www

    RewriteEngine On
    # Let Certbot's HTTP-01 challenge pass without redirect.
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    ErrorLog  ${APACHE_LOG_DIR}/www.pimenta.fun-error.log
    CustomLog ${APACHE_LOG_DIR}/www.pimenta.fun-access.log combined
</VirtualHost>

# ---- HTTPS ----
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName www.pimenta.fun
    ServerAlias pimenta.fun

    DocumentRoot /var/www/pimenta/www

    <Directory /var/www/pimenta/www>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    DirectoryIndex index.html

    # --- TLS (paths created by certbot) ---
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/www.pimenta.fun/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/www.pimenta.fun/privkey.pem

    # --- TLS hardening (protocols, ciphers, OCSP stapling) ---
    Include /etc/apache2/conf-available/pimenta-ssl-params.conf

    # --- Response headers ---
    Include /etc/apache2/conf-available/pimenta-security-headers.conf

    # --- Custom error pages (served from the lab's /error/* pages) ---
    ErrorDocument 403 /error/error403/
    ErrorDocument 404 /error/error404/
    ErrorDocument 406 /error/error406/
    ErrorDocument 502 /error/error502/
    ErrorDocument 503 /maintenance/

    ErrorLog  ${APACHE_LOG_DIR}/www.pimenta.fun-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/www.pimenta.fun-ssl-access.log combined
</VirtualHost>
</IfModule>
