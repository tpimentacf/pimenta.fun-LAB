# Global OCSP stapling cache (server context — NOT inside a vhost).
# Deploy to: /etc/apache2/conf-available/pimenta-ssl-stapling.conf
# Enable with: sudo a2enconf pimenta-ssl-stapling
# Requires:    sudo a2enmod ssl socache_shmcb
#
# SSLUseStapling is set per-vhost in pimenta-ssl-params.conf; this shared
# cache must exist once at the server level for stapling to work.

<IfModule mod_ssl.c>
    SSLStaplingCache "shmcb:${APACHE_RUN_DIR}/ssl_stapling(32768)"
</IfModule>
