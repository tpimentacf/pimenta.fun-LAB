# api.pimenta.fun — HTTPS reverse proxy to the Pimenta API (127.0.0.1:3000)
# Enable modules:  sudo a2enmod ssl headers rewrite proxy proxy_http
#
# Backend service: /opt/pimenta-api (systemd: pimenta-api), listening on :3000.

# ---- HTTP : redirect to HTTPS ----
<VirtualHost *:80>
    ServerName api.pimenta.fun
    DocumentRoot /var/www/pimenta/api

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    ErrorLog  ${APACHE_LOG_DIR}/api.pimenta.fun-error.log
    CustomLog ${APACHE_LOG_DIR}/api.pimenta.fun-access.log combined
</VirtualHost>

# ---- HTTPS ----
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName api.pimenta.fun

    # Static API console at the document root.
    DocumentRoot /var/www/pimenta/api

    <Directory /var/www/pimenta/api>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    DirectoryIndex index.html

    # --- TLS ---
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/api.pimenta.fun/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.pimenta.fun/privkey.pem

    # --- TLS hardening (protocols, ciphers, OCSP stapling) ---
    Include /etc/apache2/conf-available/pimenta-ssl-params.conf

    # --- Response headers ---
    Include /etc/apache2/conf-available/pimenta-security-headers.conf

    # --- Reverse proxy to the backend ---
    ProxyPreserveHost On
    ProxyRequests Off

    # The console (static) stays at "/"; API routes go to the backend.
    ProxyPass        /rest/   http://127.0.0.1:3000/rest/
    ProxyPassReverse /rest/   http://127.0.0.1:3000/rest/
    ProxyPass        /api/    http://127.0.0.1:3000/api/
    ProxyPassReverse /api/    http://127.0.0.1:3000/api/
    ProxyPass        /health  http://127.0.0.1:3000/health
    ProxyPassReverse /health  http://127.0.0.1:3000/health

    ErrorLog  ${APACHE_LOG_DIR}/api.pimenta.fun-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/api.pimenta.fun-ssl-access.log combined
</VirtualHost>
</IfModule>
