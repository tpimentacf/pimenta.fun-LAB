# Modern TLS hardening for all Pimenta HTTPS vhosts.
# Deploy to: /etc/apache2/conf-available/pimenta-ssl-params.conf
# Requires:  sudo a2enmod ssl headers socache_shmcb
# Include this inside each *:443 <VirtualHost> block (after SSLEngine on).
#
# Aligned with Mozilla "Intermediate" recommendations.

<IfModule mod_ssl.c>
    # Protocols: TLS 1.2 + 1.3 only (no SSLv3 / TLS 1.0 / 1.1).
    SSLProtocol             -all +TLSv1.2 +TLSv1.3

    # Let the client pick among our strong ciphers (best for TLS 1.3).
    SSLHonorCipherOrder     off
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384

    # Disable TLS compression and session tickets (mitigate CRIME / improve PFS).
    SSLCompression          off
    SSLSessionTickets       off

    # OCSP stapling (faster, more private cert revocation checks).
    SSLUseStapling          on

    # Restrict renegotiation.
    SSLInsecureRenegotiation off
</IfModule>
