# aop.pimenta.fun — test Cloudflare Authenticated Origin Pulls (AOP).
# Enable modules:  sudo a2enmod ssl headers rewrite
#
# AOP = Cloudflare presents a CLIENT certificate to this origin; the origin
# verifies it against Cloudflare's origin-pull CA. Download the CA first:
#
#   sudo mkdir -p /etc/apache2/cloudflare
#   sudo curl -fsSL \
#     https://developers.cloudflare.com/ssl/static/authenticated_origin_pull_ca.pem \
#     -o /etc/apache2/cloudflare/origin-pull-ca.pem
#
# NOTE: this vhost references that CA file — it must exist or Apache won't start.

# ---- HTTP : redirect to HTTPS ----
<VirtualHost *:80>
    ServerName aop.pimenta.fun
    DocumentRoot /var/www/pimenta/aop

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    ErrorLog  ${APACHE_LOG_DIR}/aop.pimenta.fun-error.log
    CustomLog ${APACHE_LOG_DIR}/aop.pimenta.fun-access.log combined
</VirtualHost>

# ---- HTTPS ----
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName aop.pimenta.fun

    DocumentRoot /var/www/pimenta/aop

    <Directory /var/www/pimenta/aop>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    DirectoryIndex index.html

    # --- TLS (server cert from certbot) ---
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/aop.pimenta.fun/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/aop.pimenta.fun/privkey.pem

    # --- TLS hardening + response headers ---
    Include /etc/apache2/conf-available/pimenta-ssl-params.conf
    Include /etc/apache2/conf-available/pimenta-security-headers.conf

    # ======================================================================
    # Authenticated Origin Pulls — verify Cloudflare's client certificate.
    # ======================================================================
    # TEST MODE (default): "optional" keeps the page reachable and reports the
    # verification result in headers, so the test page can show SUCCESS/NONE.
    SSLVerifyClient        optional
    SSLVerifyDepth         1
    SSLCACertificateFile   /etc/apache2/cloudflare/origin-pull-ca.pem
    SSLOptions             +StdEnvVars +ExportCertData

    # Expose the client-auth result to the page (and to curl) as headers.
    <IfModule mod_headers.c>
        Header always set X-AOP-Client-Verify  "%{SSL_CLIENT_VERIFY}s"
        Header always set X-AOP-Client-Subject "%{SSL_CLIENT_S_DN}s"
        Header always set X-AOP-Client-Issuer  "%{SSL_CLIENT_I_DN}s"
    </IfModule>

    # ENFORCE MODE: to reject any traffic that isn't from Cloudflare, replace
    # the "optional" line above with the following (origin returns 400 to
    # direct/non-CF clients):
    #
    #   SSLVerifyClient require

    ErrorLog  ${APACHE_LOG_DIR}/aop.pimenta.fun-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/aop.pimenta.fun-ssl-access.log combined
</VirtualHost>
</IfModule>
