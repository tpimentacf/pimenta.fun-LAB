# Shared response headers for all Pimenta vhosts.
# Deploy to: /etc/apache2/conf-available/pimenta-security-headers.conf
# Requires:  sudo a2enmod headers
# Include this inside each *:443 <VirtualHost> block.

<IfModule mod_headers.c>
    # Force HTTPS for a year (only meaningful when sent over HTTPS).
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Hardening headers.
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    Header always set Cross-Origin-Opener-Policy "same-origin"

    # Custom lab marker.
    Header always set X-Pimenta-Lab "pimenta.fun security lab"

    # Reduce fingerprinting (also set 'ServerTokens Prod' globally in
    # /etc/apache2/conf-available/security.conf for full effect).
    Header always unset X-Powered-By
    RequestHeader unset Proxy early
</IfModule>
