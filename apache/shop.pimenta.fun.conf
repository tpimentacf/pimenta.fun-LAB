# shop.pimenta.fun — static storefront over HTTPS (HTTP redirects to HTTPS)
# Enable modules:  sudo a2enmod ssl headers rewrite

# ---- HTTP : redirect to HTTPS ----
<VirtualHost *:80>
    ServerName shop.pimenta.fun
    DocumentRoot /var/www/pimenta/shop

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    ErrorLog  ${APACHE_LOG_DIR}/shop.pimenta.fun-error.log
    CustomLog ${APACHE_LOG_DIR}/shop.pimenta.fun-access.log combined
</VirtualHost>

# ---- HTTPS ----
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName shop.pimenta.fun

    DocumentRoot /var/www/pimenta/shop

    <Directory /var/www/pimenta/shop>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    DirectoryIndex index.html

    # --- TLS ---
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/shop.pimenta.fun/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/shop.pimenta.fun/privkey.pem

    # --- TLS hardening (protocols, ciphers, OCSP stapling) ---
    Include /etc/apache2/conf-available/pimenta-ssl-params.conf

    # --- Response headers ---
    Include /etc/apache2/conf-available/pimenta-security-headers.conf

    # The shop calls api.pimenta.fun directly (CORS allowed by the API), so no
    # proxy is needed here. If you prefer same-origin, uncomment to proxy /api
    # and /rest through this host (requires: a2enmod proxy proxy_http):
    #
    # SSLProxyEngine on
    # ProxyPass        /rest/  http://127.0.0.1:3000/rest/
    # ProxyPassReverse /rest/  http://127.0.0.1:3000/rest/
    # ProxyPass        /api/   http://127.0.0.1:3000/api/
    # ProxyPassReverse /api/   http://127.0.0.1:3000/api/

    ErrorLog  ${APACHE_LOG_DIR}/shop.pimenta.fun-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/shop.pimenta.fun-ssl-access.log combined
</VirtualHost>
</IfModule>
