<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turnstile (Non-Interactive) &mdash; Pimenta Lab</title>
  <link rel="stylesheet" href="/assets/lab.css" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <header class="lab">
    <div class="brand">pimenta<span>.fun</span> lab</div>
    <nav>
      <a href="https://www.pimenta.fun">Home</a>
      <a href="https://www.pimenta.fun/#tests">Tests</a>
    </nav>
  </header>

  <main class="lab">
    <div class="crumb"><a href="https://www.pimenta.fun/#tests">Tests</a> / Turnstile / Non-Interactive</div>
    <span class="tag">Turnstile</span>
    <h1>Turnstile &mdash; <span class="grad">Non-Interactive</span></h1>
    <div class="warn">Uses the Cloudflare <strong>test sitekey</strong> (always passes). Swap in your real sitekey for a live test.</div>
    <form class="panel" id="f">
      <p style="color:var(--text)">Widget mode: <strong>Non-Interactive</strong></p>
      <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-theme="dark" data-callback="onToken"></div>
      <br /><button class="btn" type="submit">Submit</button>
    </form>
    <div id="result"></div>
    <h2>Token</h2>
    <pre id="token">(waiting…)</pre>
  </main>

  <footer class="lab">
    Pimenta lab &middot; <a href="https://www.pimenta.fun/#tests">back to tests</a>
  </footer>
  <script>
    function onToken(t){ document.getElementById('token').textContent = t; }
    document.getElementById('f').addEventListener('submit', function(e){ e.preventDefault();
      var r = document.getElementById('result'); r.className='ok';
      r.textContent = 'Token captured — verify server-side via /siteverify.'; });
  </script>
</body>
</html>
